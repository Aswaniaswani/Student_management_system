{% extends 'base.html' %}
{% block title %}Add Course{% endblock %}

{% block content %}
<div class="card">
    <h2>Add New Course</h2>
    <!-- <p>Create courses and assign them later to teachers & students.</p> -->

    <form method="post">
        {% csrf_token %}

        <label>Course Name</label>
        <input type="text" name="course_name" placeholder="Eg: Data Structures" required>

        <label>Course Code</label>
        <input type="text" name="course_code" placeholder="Eg: CS201" required>

        <label>Description</label>
        <input type="text" name="description" placeholder="Short description">

        <button type="submit">Add Course</button>
    </form>
</div>
{% endblock %}
