{% extends "base.html" %}
{% block content %}
<div class="card">
    <h3>Attendance Report</h3>

    <table>
        <tr>
            <th>Course</th>
            <th>Percentage</th>
        </tr>
        {% for a in data %}
        <tr>
            <td>{{ a.id }}</td>
            <td>{{ a.percentage }}%</td>
        </tr>
        {% endfor %}
    </table>
</div>
{% endblock %}
