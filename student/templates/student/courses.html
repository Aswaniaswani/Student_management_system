{% extends "base.html" %}
{% block content %}
<div class="card">
    <h3>My Enrolled Courses</h3>

    <table>
        <tr>
            <th>Course Name</th>
            <th>Course Code</th>
        </tr>

        {% for c in courses %}
        <tr>
            <td>{{ c.course_name }}</td>
            <td>{{ c.course_code }}</td>
        </tr>
        {% empty %}
        <tr>
            <td colspan="2">No enrolled courses</td>
        </tr>
        {% endfor %}
    </table>
</div>
{% endblock %}
