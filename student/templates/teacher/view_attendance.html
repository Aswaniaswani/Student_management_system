{% extends 'base.html' %}
{% block content %}

<h2>Attendance Records</h2>

<table class="table">
    <tr>
        <th>Student</th>
        <th>Course</th>
        <th>Date</th>
        <th>Status</th>
    </tr>

    {% for r in records %}
    <tr>
        <td>{{ r.student_name }}</td>
        <td>{{ r.course_name }}</td>
        <td>{{ r.date }}</td>
        <td>
            {% if r.present %}
                <span style="color:green;">Present</span>
            {% else %}
                <span style="color:red;">Absent</span>
            {% endif %}
        </td>
    </tr>
    {% empty %}
    <tr><td colspan="4">No attendance records</td></tr>
    {% endfor %}
</table>

{% endblock %}
